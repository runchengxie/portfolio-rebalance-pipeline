# 回测配置文件
# 统一三个回测脚本的时间区间和参数

backtest:
  # 时间模式: fixed (固定时间区间) 或 dynamic (动态时间区间)
  period_mode: fixed
  
  # 固定时间区间设置
  start: 2021-04-02
  end: 2025-07-02
  
  # 动态模式下的缓冲时间（仅在period_mode为dynamic时生效）
  buffer:
    months: 3
    days: 10
  
  # 各策略的初始资金
  initial_cash:
    ai: 1000000      # AI精选策略
    quant: 1000000   # 量化初选策略
    spy: 100000      # SPY基准策略