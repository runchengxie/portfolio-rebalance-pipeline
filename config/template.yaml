# 回测配置模板文件
# 复制此文件为 config.yaml 并根据需要修改配置
# 注意：config.yaml 不会被提交到版本库中

backtest:
  # 时间区间模式
  # fixed: 使用固定的开始和结束日期
  # dynamic: 根据投资组合数据动态确定时间范围
  period_mode: fixed
  
  # 回测时间区间（仅在 period_mode: fixed 时生效）
  start: 2021-04-02  # 回测开始日期 (YYYY-MM-DD)
  end: 2025-07-02    # 回测结束日期 (YYYY-MM-DD)
  
  # 时间缓冲设置（仅在 period_mode: dynamic 时生效）
  # 用于在最后一个调仓日期后添加额外的持有期
  buffer:
    months: 3  # 额外月数
    days: 10   # 额外天数
  
  # 初始资金配置
  # 方式1：统一资金（推荐）- 所有策略使用相同的初始资金
  initial_cash: 1000000  # 统一初始资金：100万美元
  
  # 方式2：分策略配置（可选）- 如需要不同策略使用不同资金，可使用以下格式：
  # initial_cash:
  #   ai: 1000000      # AI选股策略
  #   quant: 1000000   # 量化初选策略  
  #   spy: 1000000     # SPY基准策略
  
# 配置说明：
# 1. 统一资金的优势：
#    - 便于直观比较不同策略的绝对收益曲线
#    - 简化配置管理
#    - 百分比指标（收益率、年化收益、最大回撤）不受资金规模影响
#
# 2. 时间区间统一的重要性：
#    - 确保所有策略在相同时间窗口内进行比较
#    - 避免"用不同尺子量同一张桌子"的问题
#    - 提高回测结果的可比性和可信度
#
# 3. 使用建议：
#    - 生产环境建议使用 period_mode: fixed 确保结果可复现
#    - 开发测试时可使用 period_mode: dynamic 自动适应数据范围