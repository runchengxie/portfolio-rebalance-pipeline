name: rewrite-history
on:
  workflow_dispatch: {}     # 只手动触发，避免循环自爆
permissions:
  contents: write

jobs:
  rewrite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 拉全历史，手术需要

      - name: Install git-filter-repo
        run: |
          sudo apt-get update
          sudo apt-get install -y git-filter-repo

      - name: Safety backup bundle
        run: |
          git bundle create ../before-rewrite.bundle --all
          ls -lh ../before-rewrite.bundle

      - name: "Rewrite: drop data/ from all history"
        run: |
          git config user.name  "repo-surgeon"
          git config user.email "action@users.noreply.github.com"
          git filter-repo --path data --invert-paths --force

      - name: Force push rewritten history
        env:
          REPO: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          git gc --prune=now
          git push --force --mirror "$REPO"
