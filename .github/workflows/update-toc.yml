name: Update TOC
on:
  push:
    paths:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: write # Write permission is needed to push the changes back

concurrency:
  group: toc-${{ github.ref }} # Avoid concurrent runs on the same branch
  cancel-in-progress: true

jobs:
  toc:
    # Avoid infinite loops: skip if the trigger is the workflow's own "chore: update TOC" commit
    if: ${{ !contains(github.event.head_commit.message, 'chore: update TOC') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install doctoc
        run: npm i -g doctoc@2

      - name: Update TOC in all markdown files
        run: |
          # Run it on the entire repository to avoid figuring out which files changed
          doctoc README.md --github --maxlevel 3 --notitle

      - name: Commit changes if any
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "toc-bot"
            git config user.email "toc-bot@users.noreply.github.com"
            git commit -am "chore: update TOC"
            git push
          else
            echo "No TOC changes."
          fi```